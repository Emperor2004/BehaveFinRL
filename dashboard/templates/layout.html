<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0B0D19]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BehaveFinRL - Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- MathJax for LaTeX Equations -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)']],
                displayMath: [['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0B0D19;
            color: #E2E8F0;
        }
        .glass-card {
            background: #121425;
            border: 1px solid #1B1E32;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        .glow-hover:hover {
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.25);
            border-color: rgba(138, 43, 226, 0.4);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0B0D19;
        }
        ::-webkit-scrollbar-thumb {
            background: #25283C;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3B82F6;
        }
    </style>
</head>
<body class="h-full text-slate-100 flex flex-col md:flex-row overflow-hidden relative">

    <!-- Ambient Background Glows -->
    <div class="absolute top-0 right-0 w-[600px] h-[600px] rounded-full bg-purple-600/5 blur-[130px] pointer-events-none z-0"></div>
    <div class="absolute bottom-0 left-0 w-[600px] h-[600px] rounded-full bg-blue-600/5 blur-[130px] pointer-events-none z-0"></div>

    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-[#0F1122] border-b md:border-b-0 md:border-r border-[#1B1E32] flex flex-col z-20 relative">
        <!-- Logo -->
        <div class="p-6 border-b border-[#1B1E32] flex items-center space-x-3">
            <div class="h-10 w-10 rounded-xl bg-gradient-to-tr from-purple-600 to-indigo-600 flex items-center justify-center text-white shadow-lg shadow-purple-500/20">
                <i class="fa-solid fa-chart-line text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-wider text-white">BEHAVE FINRL</h1>
                <span class="text-[10px] text-slate-500 font-semibold tracking-wider block uppercase">Prospect Theory Agent</span>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="/" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition duration-200 group {% if active_page == 'overview' %}bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-medium shadow-[0_0_15px_rgba(138,43,226,0.35)]{% else %}text-slate-400 hover:bg-white/[0.03] hover:text-white{% endif %}">
                <i class="fa-solid fa-gauge-high group-hover:text-purple-400 {% if active_page == 'overview' %}text-white{% endif %}"></i>
                <span>Overview</span>
            </a>
            <a href="/training" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition duration-200 group {% if active_page == 'training' %}bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-medium shadow-[0_0_15px_rgba(138,43,226,0.35)]{% else %}text-slate-400 hover:bg-white/[0.03] hover:text-white{% endif %}">
                <i class="fa-solid fa-network-wired group-hover:text-purple-400 {% if active_page == 'training' %}text-white{% endif %}"></i>
                <span>Training Mechanics</span>
            </a>
            <a href="/regime" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition duration-200 group {% if active_page == 'regime' %}bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-medium shadow-[0_0_15px_rgba(138,43,226,0.35)]{% else %}text-slate-400 hover:bg-white/[0.03] hover:text-white{% endif %}">
                <i class="fa-solid fa-cloud-sun group-hover:text-purple-400 {% if active_page == 'regime' %}text-white{% endif %}"></i>
                <span>Market Regimes</span>
            </a>
            <a href="/shap" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition duration-200 group {% if active_page == 'shap' %}bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-medium shadow-[0_0_15px_rgba(138,43,226,0.35)]{% else %}text-slate-400 hover:bg-white/[0.03] hover:text-white{% endif %}">
                <i class="fa-solid fa-brain group-hover:text-purple-400 {% if active_page == 'shap' %}text-white{% endif %}"></i>
                <span>Explainability (SHAP)</span>
            </a>
        </nav>

        <!-- Sidebar Actions & Profile -->
        <div class="border-t border-[#1B1E32] p-4 bg-[#0B0D19]/40 space-y-4">
            <div class="flex items-center justify-between px-2 text-slate-500 text-xs">
                <span class="hover:text-white cursor-pointer"><i class="fa-solid fa-gear mr-1"></i> Settings</span>
                <span class="hover:text-white cursor-pointer"><i class="fa-solid fa-circle-question mr-1"></i> Help</span>
            </div>
            
            <div class="flex items-center space-x-3 p-2 bg-[#121425]/80 border border-[#1B1E32] rounded-xl">
                <div class="h-9 w-9 rounded-lg bg-purple-500/20 text-purple-400 flex items-center justify-center font-bold text-sm">
                    ON
                </div>
                <div class="flex-1 min-w-0">
                    <span class="text-xs font-semibold text-slate-200 block truncate">Om Narayan Pandit</span>
                    <span class="text-[9px] text-slate-500 block truncate">SIBM Pune</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col min-w-0 overflow-y-auto bg-[#0B0D19]/30 z-10">
        <!-- Header -->
        <header class="h-16 border-b border-[#1B1E32] flex items-center justify-between px-8 bg-[#0F1122]/60 backdrop-blur-md sticky top-0 z-20">
            <!-- Search & Indicators -->
            <div class="flex items-center space-x-6">
                <!-- Search bar placeholder from reference -->
                <div class="relative hidden lg:block">
                    <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                    <input type="text" placeholder="Search signals, metrics, weights..." class="bg-[#121425] border border-[#1B1E32] text-xs text-slate-300 pl-9 pr-4 py-2 rounded-xl focus:outline-none focus:border-purple-500/40 w-60 transition">
                </div>
                <div class="flex items-center space-x-2">
                    <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-xs text-slate-400 font-semibold tracking-wider uppercase">PPO Pipeline Active</span>
                </div>
            </div>

            <!-- Controls & Profile details -->
            <div class="flex items-center space-x-4">
                <!-- Notification & Actions from reference -->
                <div class="flex items-center space-x-2 border-r border-[#1B1E32] pr-4">
                    <button class="h-8 w-8 text-slate-400 hover:text-white rounded-lg bg-[#121425] hover:bg-white/5 border border-[#1B1E32] flex items-center justify-center text-xs transition relative">
                        <i class="fa-solid fa-bell"></i>
                        <span class="absolute top-1.5 right-1.5 h-1.5 w-1.5 rounded-full bg-purple-500"></span>
                    </button>
                    <button class="h-8 w-8 text-slate-400 hover:text-white rounded-lg bg-[#121425] hover:bg-white/5 border border-[#1B1E32] flex items-center justify-center text-xs transition">
                        <i class="fa-solid fa-download"></i>
                    </button>
                </div>
                <div class="flex items-center space-x-3 text-right">
                    <div>
                        <span class="text-[10px] text-slate-500 block font-semibold uppercase tracking-wider">Asset Context</span>
                        <span class="text-xs font-medium text-slate-300">S&P 500 (FRED: SP500)</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Body -->
        <main class="flex-1 p-8">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
